<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackling</title>
    <!-- Live2D Cubism Core 运行时：必须在应用入口之前加载（pixi-live2d-display 依赖 window.Live2DCubismCore）-->
    <script src="/live2dcubismcore.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src-vite/main.tsx"></script>
  </body>
</html>
